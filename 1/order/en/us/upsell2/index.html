function handleUrlParams(params) {
  const specialParams = ["p_dc", "p_tenbucksoff", "p_freeship", "p_freegift"];
  const allowedDcValues = ["5", "10", "15", "20", "25"];
  const currentAffId = params.get("affid") || sessionStorage.getItem("affid");

    ALLOWED_AFFILIATE_IDS.length === 0 ||
    (currentAffId !== null && ALLOWED_AFFILIATE_IDS.includes(currentAffId));
  if (!discountsAllowed) {
    specialParams.forEach((key) => sessionStorage.removeItem(key));
  }
  params.forEach((value, key) => {

    if (specialParams.includes(paramKey)) {

/*# sourceMappingURL=bootstrap.min.css.map */}</style><style>@layer imported{* {
    padding: 0;
    margin: 0;
    font-family: "Open Sans", sans-serif;
}
h1,
h2,
h3,
h4,
h5,
h6,
p,
ul,
li {
    padding: 0;
    margin: 0;
}

li {
    list-style: none;
}

.banner {
    background: url(https://stdigitalmvmtprod001.blob.core.windows.net/assets/develop/696-background.jpg) no-repeat top;
    background-size: cover;
}
.leftPart {
    padding-top: 100px;
}
.leftPart h3 {
    font-size: 40px;
    color: #fff;
    font-weight: 700;
    text-transform: uppercase;
}
/* .leftPart h3 span {
    text-transform: uppercase;
    font-size: 1em;
    color: #f0ff00;
    font-style: normal;
} */
.leftPart h2 {
    text-transform: uppercase;
    color: #f0ff00;
    font-size: 60px;
    font-weight: 700;
}
.d-img {
    margin: 50px 0;
}
.upPrt {
    padding-bottom: 70px;
}
.rightPart {
    padding-top: 20px;
}
.rightPart ul {
    margin-left: 30px;
    margin-top: 10px;
}
.rightPart ul li {
    font-size: 24px;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 15px;
}
.rightPart ul li span {
    margin-right: 15px;
    width: 23px;
    margin-top: 9px;
}
.rightPart ul li p {
    width: calc(100% - 23px);
    font-size: 22px;
}
.dwnPrt {
    padding: 70px 0;
}
.dwnPrt p {
    font-size: 16px;
    width: 395px;
    color: #f0ff00;
    margin: 10px auto;
    text-align: center;
    text-transform: uppercase;
    line-height: 1.3;
}
.dwnPrt .button {
    background: #ff3710;
    color: #fff;
    text-align: center;
    border-radius: 10px;
    display: block;
    margin: 25px auto 20px;
    font-size: 28px;
    text-transform: uppercase;
    width: 365px;
    text-decoration: none;
    padding: 15px 0;
    font-weight: 700;
}

.greySec {
    padding: 50px 0;
    background: #eaeaea;
}
/* .greySec p a{text-align: center;display: block;color: #1e49c4;font-size: 18px;text-decoration: underline} */
.greySec p {
    text-align: center;
}
.greySec a {
    font-size: 18px;
    line-height: 20px;
    text-align: center;
    font-family: Calibri;
    color: #777!important;
    text-decoration: none;
    font-weight: 400;
    cursor: pointer;
}
@media only screen and (max-width: 767px) {
    .greySec a {
        font-size: 13px;
        line-height: 22px;
    }
}

.footer {
    background: #fff;
    padding: 40px 0;
}
.footLogo {
    display: block;
    margin: 0 auto;
    max-width: 250px;
}
.footMenu {
    margin-top: 10px;
    text-align: center;
}
.footMenu ul li {

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      setTimeout(() => {
        const cookiesBanner = document.querySelector("[data-cookie-banner]");
        const cookieAcceptButton = document.querySelector("[data-cookie-accept-button]");
        const cookieRejectButton = document.querySelector("[data-cookie-reject-button]");

        if (!(cookiesBanner && cookieAcceptButton && cookieRejectButton)) return;

        const cookieDependentScripts = [];
        const cookiesAnswer = sessionStorage.getItem("cookiesAnswer");

        if (cookiesAnswer === "accepted" || cookiesAnswer === "rejected") {
          cookiesBanner.style.display = "none";
          injectTrackingScripts();
        } else {
          cookiesBanner.style.display = "flex";
        }

        cookieAcceptButton.addEventListener("click", () => {
          sessionStorage.setItem("cookiesAnswer", "accepted");
          cookiesBanner.style.display = "none";
          if (cookieDependentScripts.length > 0) injectTrackingScripts()
        });

        cookieRejectButton.addEventListener("click", () => {
          sessionStorage.setItem("cookiesAnswer", "rejected");
          cookiesBanner.style.display = "none";
        });

        function injectTrackingScripts() {
          cookieDependentScripts.forEach((script) => {
            if (script.src) {
              const scriptElement = document.createElement("script");
              scriptElement.src = script.src;
              scriptElement.async = true;
              document.head.appendChild(scriptElement);
            } else if (script.text) {
              const scriptElement = document.createElement("script")
              scriptElement.innerHTML = script.text;
              document.head.appendChild(scriptElement);
            }
          })
        }
      }, 500);
    });
  </script>
  </body></html>
